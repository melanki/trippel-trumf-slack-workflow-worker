apiVersion: apps/v1
kind: Deployment
metadata:
  name: trippel-trumf-worker
  namespace: trippel-trumf
  labels:
    app.kubernetes.io/name: trippel-trumf-worker
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: trippel-trumf-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trippel-trumf-worker
    spec:
      serviceAccountName: trippel-trumf-worker
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      containers:
        - name: worker
          image: ghcr.io/melanki/trippel-trumf-slack-workflow-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: trippel-trumf-worker-config
          env:
            - name: TrippelTrumfService__SlackWorkflowWebhookUrl
              valueFrom:
                secretKeyRef:
                  name: trippel-trumf-worker-secrets
                  key: TrippelTrumfService__SlackWorkflowWebhookUrl
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
